# Tiny Tapeout project information

project:
  title: "Fibonacci Counter"
  author: "Your Name"
  discord: "your_discord_username"
  description: "8-bit Fibonacci sequence generator using simple register feedback logic"
  language: "Verilog"
  clock_hz: 100000000   # 100 MHz typical TinyTapeout clock

  # 1x1 tile design (very small digital logic)
  tiles: "1x1"

  # IMPORTANT: must match your Verilog top module name exactly
  top_module: "tt_um_fibonacci_counter"

  # Source files (must be inside ./src)
  source_files:
    - "tt_um_fibonacci_counter.v"

# ----------------------------------------------------
# Pin mapping (keep clean and meaningful for docs)
# ----------------------------------------------------
pinout:

  # Inputs
  ui[0]: "enable"
  ui[1]: "unused"
  ui[2]: "unused"
  ui[3]: "unused"
  ui[4]: "unused"
  ui[5]: "unused"
  ui[6]: "unused"
  ui[7]: "unused"

  # Outputs
  uo[0]: "fib[0]"
  uo[1]: "fib[1]"
  uo[2]: "fib[2]"
  uo[3]: "fib[3]"
  uo[4]: "fib[4]"
  uo[5]: "fib[5]"
  uo[6]: "fib[6]"
  uo[7]: "fib[7]"

  # Bidirectional pins (not used)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
